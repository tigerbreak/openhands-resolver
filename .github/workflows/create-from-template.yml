name: Create Project from Template

on:
  workflow_dispatch:
    inputs:
      new_repo_name:
        description: 'New repository name (e.g., my-project-1)'
        required: true
        type: string
      project_description:
        description: 'Project description'
        required: false
        type: string
        default: 'Auto-generated project from OpenHands template'
      is_private:
        description: 'Make repository private'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  create-and-setup:
    runs-on: ubuntu-latest
    outputs:
      new_repo_url: ${{ steps.create.outputs.repo_url }}
    steps:
      - name: Checkout template
        uses: actions/checkout@v4

      - name: Create repository from template
        id: create
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || github.token }}
        run: |
          # Create new repository from template
          NEW_REPO_URL=$(gh repo create ${{ inputs.new_repo_name }} \
            --template ${{ github.repository }} \
            --description "${{ inputs.project_description }}" \
            --private=${{ inputs.is_private }} \
            --source ${{ github.repository }} \
            --remote)
          
          # Extract repo name (owner/repo format)
          NEW_REPO_NAME=$(echo "$NEW_REPO_URL" | sed 's|https://github.com/||')
          
          echo "repo_url=$NEW_REPO_URL" >> $GITHUB_OUTPUT
          echo "repo_name=$NEW_REPO_NAME" >> $GITHUB_OUTPUT
          
          echo "✅ Created repository: $NEW_REPO_URL"
          echo "📝 Repository name: $NEW_REPO_NAME"
          
          # Wait for repository to be ready
          echo "⏳ Waiting for repository to be ready..."
          sleep 10

      - name: Setup repository secrets
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || github.token }}
          NEW_REPO: ${{ steps.create.outputs.repo_name }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          PAT_USERNAME: ${{ secrets.PAT_USERNAME }}
        run: |
          echo "🔐 Configuring secrets for $NEW_REPO"
          
          # Set repository variables
          gh variable set LLM_MODEL --body "openai/qwen3.5-plus" --repo $NEW_REPO || true
          gh variable set TARGET_BRANCH --body "main" --repo $NEW_REPO || true
          
          echo "📋 Setup instructions created"

      - name: Create initial issue
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || github.token }}
        run: |
          gh issue create \
            --title "🚀 Initialize Project" \
            --body "This is the initial issue to set up the project.\n\n## Next Steps:\n\n1. Configure repository secrets (see README)\n2. Add your project requirements\n3. Add fix-me label to trigger OpenHands" \
            --label "fix-me" \
            --repo ${{ steps.create.outputs.repo_name }}
          
          echo "✅ Created initial issue with fix-me label"

      - name: Output summary
        run: |
          echo "## 🎉 Project Created Successfully!"
          echo ""
          echo "**Repository URL:** ${{ steps.create.outputs.repo_url }}"
          echo ""
          echo "### Next Steps:"
          echo "1. ⚠️ Configure repository secrets (see repository README)"
          echo "2. 📝 Add your project requirements to the initial issue"
          echo "3. 🤖 The fix-me label is already added - OpenHands will start after secrets are configured"
          echo ""
          echo "### Quick Setup with GitHub CLI:"
          echo "gh repo clone ${{ steps.create.outputs.repo_name }}"
          echo "cd ${{ inputs.new_repo_name }}"
